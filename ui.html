<style>
  /* ─── Layout-only styles. fig.css owns all component styling. ─── */

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    width: 300px;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--figma-color-bg);
    color: var(--figma-color-text);
  }

  .panel-scroll { flex: 1; overflow-y: auto; }
  .panel-pad    { padding: var(--spacer-3); }
  .panel-pad.locked { pointer-events: none; opacity: 0.45; }

  /* ── Image management header ── */
  .images-header {
    display: flex;
    align-items: center;
    gap: var(--spacer-2);
    margin-bottom: var(--spacer-1);
  }
  .img-count {
    flex: 1;
    font-size: var(--body-medium-fontSize);
    font-weight: var(--body-medium-strong-fontWeight);
    color: var(--figma-color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Thumb strip ── */
  /* Wrap owns the border + radius + clipping. Fades extend to the inside
     edge of the border so they line up cleanly with the rounded corner. */
  .thumb-strip-wrap {
    position: relative;
    border: 1px solid var(--figma-color-border);
    border-radius: var(--radius-medium);
    overflow: hidden;
  }
  .thumb-strip-wrap::after,
  .thumb-strip-wrap::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 28px;
    pointer-events: none;
  }
  /* Right fade: always visible — signals horizontal overflow, harmless over empty bg. */
  .thumb-strip-wrap::after {
    right: 0;
    background: linear-gradient(to right,
      transparent 0%,
      var(--figma-color-bg-secondary) 100%);
  }
  /* Left fade: only when content is scrolled past the left edge. */
  .thumb-strip-wrap::before {
    left: 0;
    background: linear-gradient(to left,
      transparent 0%,
      var(--figma-color-bg-secondary) 100%);
    opacity: 0;
    transition: opacity 0.15s linear;
  }
  .thumb-strip-wrap.show-fade-left::before { opacity: 1; }
  #thumb-strip {
    display: flex;
    gap: var(--spacer-1);
    overflow-x: auto;
    padding: var(--spacer-2);
    min-height: 66px;
    align-items: stretch;
    background: var(--figma-color-bg-secondary);
  }

  .thumb {
    width: 50px;
    height: 50px;
    border-radius: var(--radius-small, 4px);
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    border: 1px solid var(--figma-color-border);
    background: var(--figma-color-bg);
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-remove {
    position: absolute;
    top: 2px; right: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--figma-color-bg-inverse);
    color: var(--figma-color-text-oninverse);
    border: none;
    cursor: pointer;
    display: none;
    padding: 0;
    align-items: center;
    justify-content: center;
  }
  .thumb-remove .fig-mask-icon { --size: 10px; }
  /* Both buttons are 24×24 (figui3 default ghost icon). icon-add fills 50% of its
     24×24 viewBox; icon-reset fills 75% of its 16×16 viewBox — sizing the icon-add
     container at spacer-4 (24) and icon-reset at spacer-3 (16) renders both glyphs
     at the same visual ~12px with consistent padding around each. */
  #refresh-btn .fig-mask-icon { --size: var(--spacer-4); }
  #clear-btn   .fig-mask-icon { --size: var(--spacer-3); }
  .thumb-remove:hover { background: var(--figma-color-bg-inverse-hover, var(--figma-color-bg-inverse)); }
  .thumb:hover .thumb-remove { display: flex; }

  .thumb-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--spacer-1);
    width: 100%;
    color: var(--figma-color-text-secondary);
    font-size: var(--body-small-fontSize, 11px);
    text-align: center;
  }
  .thumb-placeholder {
    width: 100%; height: 100%;
    background: var(--figma-color-bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--body-small-fontSize, 11px);
    font-weight: var(--body-medium-strong-fontWeight);
    color: var(--figma-color-text-tertiary);
    user-select: none;
  }
  .thumb-spinner {
    position: absolute;
    inset: 0;
    background: var(--figma-color-bg-overlay, rgba(255,255,255,0.75));
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .thumb-spinner::after {
    content: '';
    width: 14px; height: 14px;
    border: 2px solid var(--figma-color-border);
    border-top-color: var(--figma-color-bg-brand);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section { padding: 0 var(--spacer-3); }
  /* fig-field has its own internal grid padding (--fig-field-left/right-padding,
     defaults to var(--spacer-3)). When nested inside .section that already pads
     spacer-3, the two stack and push the field controls 32px in from the panel
     edge — out of alignment with the segmented control and Engage button. Zero
     the field's internal padding so the section's spacer-3 is the only one. */
  .section fig-field {
    --fig-field-left-padding: 0;
    --fig-field-right-padding: 0;
  }

  .frame-readout-row {
    display: flex;
    align-items: center;
    gap: var(--spacer-1);
    height: var(--spacer-4);
    min-width: 0;
  }
  .frame-readout {
    flex: 1;
    min-width: 0;
    color: var(--figma-color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .frame-warn-icon {
    --size: var(--spacer-3);
    --icon: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='8' cy='8' r='6.5' stroke='black'/%3E%3Cpath d='M8 4.5v4' stroke='black' stroke-linecap='round'/%3E%3Ccircle cx='8' cy='11.5' r='0.6' fill='black'/%3E%3C/svg%3E");
    color: var(--figma-color-text);
    flex-shrink: 0;
    display: none;
  }
  .frame-warn-icon.visible { display: inline-block; }
  /* Truncate page-size dropdown text rather than letting it overflow the field.
     The global [full]{min-width:3rem} rule from figui3 needs to be overridden so
     the dropdown can shrink past 48px; selectedcontent (modern) and the inner
     button get the text-overflow/ellipsis treatment. */
  fig-dropdown[full] { min-width: 0; }
  fig-dropdown { min-width: 0; max-width: 100%; }
  fig-dropdown > select {
    min-width: 0;
    max-width: 100%;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }
  fig-dropdown > select > button {
    display: inline-flex;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }
  fig-dropdown selectedcontent {
    display: inline-block;
    min-width: 0;
    max-width: 100%;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
  }

  /* ── Layout mode: segmented + (optional) lock-note grouped together ── */
  .layout-mode { margin: var(--spacer-3) 0; }
  fig-segmented-control { width: 100%; margin: 0; }

  /* ── Soft-lock for segmented control when re-rolling MB3K ── */
  fig-segmented-control.locked { pointer-events: none; }
  fig-segmented-control.locked fig-segment:not([selected]) { opacity: 0.45; }
  /* Lock-note belongs visually to the segmented control above it,
     not the slider rows below — small gap above, wrapper handles below. */
  .layout-lock-note {
    margin-top: var(--spacer-1);
    font-size: var(--body-small-fontSize, 10px);
    text-align: center;
    display: none;
  }
  .layout-lock-note.visible { display: block; }

  /* ── Generate button area ── */
  .generate-wrap {
    padding: var(--spacer-3) var(--spacer-3) var(--spacer-2);
    border-top: 1px solid var(--figma-color-border);
  }
  .generate-wrap fig-button { width: 100%; }

  /* ── Footer links (under Engage button, no border) ── */
  .footer-links {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 var(--spacer-3) var(--spacer-2);
    font-size: 10px;
    color: var(--figma-color-text-tertiary);
  }
  .footer-links .coffee-link {
    color: var(--figma-color-text-secondary);
    text-decoration: none;
  }
  .footer-links .coffee-link:hover { color: var(--figma-color-text); text-decoration: underline; }
  .footer-links .credit { color: var(--figma-color-text-tertiary); }
  .footer-links .credit a {
    color: inherit;
    text-decoration: none;
  }
  .footer-links .credit a:hover { color: var(--figma-color-text-secondary); text-decoration: underline; }

  /* ── Primary button color states ── */
  fig-button#generate-btn[data-kind="shuffle"] {
    --figma-color-bg-brand:         #14AE5C;
    --figma-color-bg-brand-hover:   #0F8F4B;
    --figma-color-bg-brand-pressed: #0A6E37;
  }
  fig-button#generate-btn[data-kind="fit"] {
    --figma-color-bg-brand:         #9747FF;
    --figma-color-bg-brand-hover:   #7B2CFF;
    --figma-color-bg-brand-pressed: #5C1FB3;
  }

  #file-input { display: none; }

  /* ── figui3 fig-spinner positioning in toast ── */
  #status-text fig-spinner {
    margin-right: 6px;
    vertical-align: middle;
  }
  /* status toast: hug the text (fig-toast's default shrink-to-fit), but cap the
     width at 180px so longer messages wrap instead of growing wide; auto height
     so wrapped lines aren't clipped by fig-toast's fixed one-line height. */
  #status-toast { height: auto; max-width: 180px; }
  #status-toast #status-text { margin: 0; text-align: center; }
</style>
</head>
<body>

<div class="panel-scroll">
  <div class="panel-pad">

    <!-- ── Image management ── -->
    <div class="images-header">
      <span class="img-count" id="img-count">0 images</span>
      <fig-tooltip id="refresh-tooltip" text="Add selected images">
        <fig-button variant="ghost" icon id="refresh-btn" disabled>
          <span class="fig-mask-icon" style="--icon:var(--icon-add)"></span>
        </fig-button>
      </fig-tooltip>
      <fig-tooltip text="Clear all images">
        <fig-button variant="ghost" icon id="clear-btn" disabled>
          <span class="fig-mask-icon" style="--icon:var(--icon-reset)"></span>
        </fig-button>
      </fig-tooltip>
    </div>

    <div class="thumb-strip-wrap">
      <div id="thumb-strip">
        <div class="thumb-empty" id="thumb-empty">
          <fig-shimmer playing="false" id="empty-shimmer"><span class="thumb-empty-hint">Select images on canvas, then +</span></fig-shimmer>
          <span class="thumb-empty-hint subtle">or drag images from desktop</span>
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple />
  </div>

  <!-- ── Layout ── -->
  <fig-header>Layout</fig-header>
  <div class="section">
    <div class="layout-mode">
      <fig-segmented-control id="layout-control" value="grid" sizing="equal" animated>
        <fig-segment value="grid">Grid</fig-segment>
        <fig-segment value="editorial">Editorial</fig-segment>
        <fig-segment value="masonry">Masonry</fig-segment>
        <fig-segment value="cluster">Cluster</fig-segment>
      </fig-segmented-control>
      <div id="layout-lock-note" class="layout-lock-note subtle">Remix preserves the original mode</div>
    </div>
    <fig-field direction="horizontal">
      <label>Gap</label>
      <fig-slider id="gap-slider" type="range" min="0" max="60" value="8" step="1" text="true" units="px" variant="neue" full></fig-slider>
    </fig-field>
    <fig-field direction="horizontal">
      <label>Margin</label>
      <fig-slider id="padding-slider" type="range" min="0" max="100" value="24" step="1" text="true" units="px" variant="neue" full></fig-slider>
    </fig-field>
    <fig-field direction="horizontal">
      <label>Rounding</label>
      <fig-slider id="radius-slider" type="range" min="0" max="100" value="0" step="1" text="true" units="px" variant="neue" full></fig-slider>
    </fig-field>
  </div>

  <!-- ── Page ── -->
  <div class="section">
    <fig-field direction="horizontal">
      <label>Page size</label>
      <fig-dropdown id="preset-select" value="1920x1080" experimental="modern" full>
        <option value="1920x1080">Slide · 1920×1080 (16:9)</option>
        <option value="1440x1080">Landscape · 1440×1080 (4:3)</option>
        <option value="960x1080">Half Page · 960×1080 (8:9)</option>
      </fig-dropdown>
      <span class="frame-readout-row" id="frame-readout-row" style="display:none">
        <span id="frame-readout" class="frame-readout"></span>
        <fig-tooltip text="Images may be really small">
          <span id="frame-warn-icon" class="fig-mask-icon frame-warn-icon"></span>
        </fig-tooltip>
      </span>
    </fig-field>
    <fig-field direction="horizontal">
      <label>Background</label>
      <fig-input-color id="bg-color-picker" value="#FFFFFF" text="true" picker="native" full></fig-input-color>
    </fig-field>
  </div>

</div><!-- /panel-scroll -->

<div class="generate-wrap">
  <fig-button id="generate-btn" variant="primary" size="large" disabled>Engage 3000</fig-button>
</div>

<div class="footer-links">
  <a class="coffee-link" href="https://buy.stripe.com/aFa9ASawR5q2fhQ3yAaMU00" target="_blank" rel="noopener">Buy me a coffee</a>
  <span class="credit">by <a href="https://x.com/gavinpotenza" target="_blank" rel="noopener">Gavin Potenza</a></span>
</div>

<dialog is="fig-toast" id="status-toast" theme="dark" offset="74" duration="2000">
  <p id="status-text"></p>
</dialog>

		return overr*overc/(s1*s1+s2*s2-overr*overc);

<script>

// ── DOM refs ─────────────────────────────────────────────────────────────────
const thumbStrip   = document.getElementById('thumb-strip');
const thumbEmpty   = document.getElementById('thumb-empty');
const imgCount     = document.getElementById('img-count');

const fileInput    = document.getElementById('file-input');

const frameReadoutRow = document.getElementById('frame-readout-row');

const radSlider    = document.getElementById('radius-slider');

// ── Selected frame (bring-your-own-frame) ────────────────────────────────────
let selectedFrame = null;  // { id, name, width, height, mb3k } | null

// ── Focal-point detection ───────────────────────────────────────────────────
// Two-tier cascade: (1) pico.js face detector for portraits, (2) skin-tone-
// weighted saliency for everything else. Tier-3 fallback is {0.5, 0.5} on any
// error. Async and non-blocking — initial layout runs without waiting; cells
// use {0.5, 0.5} (center-crop) until detection completes for that image.
// Cached on imgRecord.focal — never re-detected for the same image.

// Pico cascade is loaded once at module init from the bundled base64 blob.
// On any decode/unpack failure the variable stays null and detectFocalPoint
// silently falls through to tier 2.
let picoClassifyRegion = null;
(function initPicoCascade() {
  try {
    const b64 = window.PICO_FACEFINDER_B64;
    if (!b64) {
      console.warn('[focal] pico cascade base64 missing; tier-1 face detection disabled');
      return;
    }
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    picoClassifyRegion = pico.unpack_cascade(bytes);
  } catch (e) {
    console.warn('[focal] pico cascade init failed; tier-1 face detection disabled:', e && e.message);
    picoClassifyRegion = null;
  }
})();

// Tier 1: pico face detection. Returns {x, y, method:'face-pico'} or null on
// no-face / any error. Resizes to 480 on the longer edge for fast scanning.
// `label` is an optional identifier for diagnostic logs.
async function detectFaceWithPico(imgEl, label) {
  if (!picoClassifyRegion) return null;
  try {
    if (!imgEl.complete || !imgEl.naturalWidth) {
      await new Promise((res, rej) => {
        imgEl.addEventListener('load', res, { once: true });
        imgEl.addEventListener('error', rej, { once: true });
      });
    }
    const W = imgEl.naturalWidth, H = imgEl.naturalHeight;
    if (!W || !H) return null;

    const longer = Math.max(W, H);
    const scale = longer > 480 ? 480 / longer : 1;
    const cw = Math.max(1, Math.round(W * scale));
    const ch = Math.max(1, Math.round(H * scale));

    const canvas = document.createElement('canvas');
    canvas.width = cw; canvas.height = ch;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, cw, ch);
    const rgba = ctx.getImageData(0, 0, cw, ch).data;

    // Pack to single-channel grayscale; pico expects {pixels, nrows, ncols, ldim}.
    const gray = new Uint8ClampedArray(cw * ch);
    for (let i = 0; i < cw * ch; i++) {
      const j = i * 4;
      gray[i] = 0.299 * rgba[j] + 0.587 * rgba[j + 1] + 0.114 * rgba[j + 2];
    }

    const image = { pixels: gray, nrows: ch, ncols: cw, ldim: cw };
    const params = {
      shiftfactor: 0.1,
      minsize: 20,
      maxsize: Math.max(cw, ch),
      scalefactor: 1.1,
    };
    const dets = pico.run_cascade(image, picoClassifyRegion, params);
    const clustered = pico.cluster_detections(dets, 0.2);
    // Detection tuple: [row, col, size, q]. Real faces score 4–40 in practice,
    // so the floor is q > 5; pair with a size floor (face >= 5% of image height)
    // to reject tiny high-ish-confidence noise clusters on textured backgrounds.
    const minFaceSize = ch * 0.05;
    const strong = clustered.filter(d => d[3] > 5.0 && d[2] > minFaceSize);
    if (!strong.length) return null;

    // Single face: return its center directly. Multiple faces: unified bbox
    // across all surviving clusters so group shots frame everyone instead of
    // zooming in on one face.
    let centerR, centerC;
    if (strong.length === 1) {
      centerR = strong[0][0];
      centerC = strong[0][1];
    } else {
      let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
      for (const d of strong) {
        const r = d[0], c = d[1], s = d[2];
        if (r - s / 2 < minR) minR = r - s / 2;
        if (r + s / 2 > maxR) maxR = r + s / 2;
        if (c - s / 2 < minC) minC = c - s / 2;
        if (c + s / 2 > maxC) maxC = c + s / 2;
      }
      centerR = (minR + maxR) / 2;
      centerC = (minC + maxC) / 2;
    }
    return {
      x: centerC / cw,
      y: centerR / ch,
      method: 'face-pico',
    };
  } catch (e) {
    return null;
  }
}

async function detectFocalPoint(imgEl, label) {
  // Tier 1: face detection.
  const face = await detectFaceWithPico(imgEl, label);
  if (face) return face;
  // Tier 2: skin-tone-weighted saliency.
  try {
    if (!imgEl.complete || !imgEl.naturalWidth) {
      await new Promise((res, rej) => {
        imgEl.addEventListener('load', res, { once: true });
        imgEl.addEventListener('error', rej, { once: true });
      });
    }
    const SIZE = 200, GRID = 8;
    const canvas = document.createElement('canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, SIZE, SIZE);
    const data = ctx.getImageData(0, 0, SIZE, SIZE).data;
    const cellPx = SIZE / GRID;
    const scored = [];
    for (let gy = 0; gy < GRID; gy++) {
      for (let gx = 0; gx < GRID; gx++) {
        const x0 = Math.floor(gx * cellPx);
        const y0 = Math.floor(gy * cellPx);
        let sumE = 0, sumS = 0, sumSkin = 0, n = 0;
        for (let py = 0; py < cellPx; py += 2) {
          for (let px = 0; px < cellPx; px += 2) {
            const x = x0 + px, y = y0 + py;
            if (x >= SIZE - 1 || y >= SIZE - 1) continue;
            const i = (y * SIZE + x) * 4;
            const r = data[i], g = data[i + 1], b = data[i + 2];
            const lum = 0.299 * r + 0.587 * g + 0.114 * b;
            const iR = (y * SIZE + (x + 1)) * 4;
            const iD = ((y + 1) * SIZE + x) * 4;
            const lumR = 0.299 * data[iR] + 0.587 * data[iR + 1] + 0.114 * data[iR + 2];
            const lumD = 0.299 * data[iD] + 0.587 * data[iD + 1] + 0.114 * data[iD + 2];
            sumE += Math.abs(lum - lumR) + Math.abs(lum - lumD);
            const maxC = Math.max(r, g, b);
            const minC = Math.min(r, g, b);
            sumS += maxC - minC;
            // Skin-tone heuristic: red-dominant, non-dark, non-gray, non-monochrome.
            // Flags faces and exposed limbs without locking onto vivid colors.
            const isSkin =
              r > 60 && g > 30 && b > 15 &&
              r > g && r > b &&
              Math.abs(r - g) > 10 &&
              (maxC - minC) > 15;
            if (isSkin) sumSkin++;
            n++;
          }
        }
        const avgE = n ? sumE / n : 0;
        const avgS = n ? sumS / n : 0;
        const avgSkin = n ? sumSkin / n : 0;
        // Center weight: gentler radial falloff (skin-tone now provides primary
        // targeting), plus a top-favoring bias since subjects skew upper-frame.
        const cx = (gx + 0.5) / GRID - 0.5;
        const cy = (gy + 0.5) / GRID - 0.5;
        const distFromCenter = Math.sqrt(cx * cx + cy * cy);
        const verticalPos = (gy + 0.5) / GRID;
        const lowerHalfPenalty = Math.max(0, verticalPos - 0.5) * 0.3;
        const centerWeight = Math.max(0.1, 1 - distFromCenter * 0.4 - lowerHalfPenalty);
        const cxN = (gx + 0.5) / GRID;
        const cyN = (gy + 0.5) / GRID;
        scored.push({
          score: (avgE + avgS * 0.3 + avgSkin * 80) * centerWeight,
          cx: cxN, cy: cyN,
        });
      }
    }
    scored.sort((a, b) => b.score - a.score);
    const top = scored.slice(0, Math.max(1, Math.round(scored.length * 0.15)));
    let sumX = 0, sumY = 0, sumW = 0;
    for (const c of top) { sumX += c.cx * c.score; sumY += c.cy * c.score; sumW += c.score; }
    if (!sumW) return { x: 0.5, y: 0.5, method: 'fallback' };
    return { x: sumX / sumW, y: sumY / sumW, method: 'saliency' };
  } catch (e) {
    return { x: 0.5, y: 0.5, method: 'fallback' };
  }
}

// Fire-and-forget detection on an image record. Cached on imgRecord.focal.
function runFocalDetection(imgRecord) {
  if (!imgRecord || imgRecord.focal) return;
  // Selection images use the 640px detection-source thumbnail; uploads use
  // the original full-resolution blob URL (no detection-source for uploads).
  const detectionSource = imgRecord.detectionBlobUrl || imgRecord.blobUrl;
  if (!detectionSource) return;
  const probe = new Image();
  const label = imgRecord.name || imgRecord.hash || 'unnamed';
  probe.onload = async () => {
    imgRecord.focal = await detectFocalPoint(probe, label);
  };
  probe.onerror = () => {
    imgRecord.focal = { x: 0.5, y: 0.5, method: 'fallback' };
  };
  probe.src = detectionSource;
}

// CSS helper — kept for any future preview surface. Not used in production:
// Figma cells use focalToImageTransform (in code.js) on the image fill instead.
function computeBackgroundPosition(focal, imgW, imgH, cellW, cellH) {
  const imgRatio = imgW / imgH;
  const cellRatio = cellW / cellH;
  let scaledW, scaledH;
  if (imgRatio > cellRatio) { scaledH = cellH; scaledW = imgW * (cellH / imgH); }
  else                       { scaledW = cellW; scaledH = imgH * (cellW / imgW); }
  const focalScaledX = focal.x * scaledW;
  const focalScaledY = focal.y * scaledH;
  let offsetX = (cellW / 2) - focalScaledX;
  let offsetY = (cellH / 2) - focalScaledY;
  offsetX = Math.max(cellW - scaledW, Math.min(0, offsetX));
  offsetY = Math.max(cellH - scaledH, Math.min(0, offsetY));
  const freeX = scaledW - cellW;
  const freeY = scaledH - cellH;
  const posX = freeX > 0 ? ((-offsetX) / freeX) * 100 : 50;
  const posY = freeY > 0 ? ((-offsetY) / freeY) * 100 : 50;
  return { posX, posY };
}

// ── Thumbnail rendering ──────────────────────────────────────────────────────
function renderThumbs() {
  thumbStrip.querySelectorAll('.thumb').forEach(el => el.remove());

  if (images.length === 0) {
    thumbEmpty.style.display = '';
  } else {
    thumbEmpty.style.display = 'none';
    images.forEach(img => {
      const wrap = document.createElement('div');
      wrap.className = 'thumb';
      wrap.title = img.name;

      if (img.blobUrl) {
        const el = document.createElement('img');
        el.src = img.blobUrl;
        el.alt = img.name;
        wrap.appendChild(el);
      } else {
        const skeleton = document.createElement('fig-skeleton');
        const fill = document.createElement('div');
        fill.style.width = '100%';
        fill.style.height = '100%';
        skeleton.appendChild(fill);
        wrap.appendChild(skeleton);
      }

      if (img.pending) {
        const sp = document.createElement('div');
        sp.className = 'thumb-spinner';
        wrap.appendChild(sp);
      }

      const rm = document.createElement('button');
      rm.className = 'thumb-remove';
      rm.title = 'Remove';
      const rmIcon = document.createElement('span');
      rmIcon.className = 'fig-mask-icon';
      rmIcon.style.setProperty('--icon', 'var(--icon-close)');
      rm.appendChild(rmIcon);
      rm.addEventListener('click', (e) => { e.stopPropagation(); removeImage(img.id); });
      wrap.appendChild(rm);
      thumbStrip.appendChild(wrap);
    });
  }

  const n = images.length;
  const noun = n === 1 ? 'image' : 'images';
  const suffix = n > 0 && n < 5 ? ' — need 5+' : n >= MAX_IMAGES ? ` — max ${MAX_IMAGES}` : '';
  imgCount.textContent = `${n} ${noun}${suffix}`;
  updateGenerateBtn();
  updateImageButtons();
  updateScrollFades();
}

function removeImage(id) {
  const idx = images.findIndex(i => i.id === id);
  if (idx === -1) return;
  if (images[idx].blobUrl) URL.revokeObjectURL(images[idx].blobUrl);
  if (images[idx].detectionBlobUrl) URL.revokeObjectURL(images[idx].detectionBlobUrl);
  images.splice(idx, 1);
  renderThumbs();
}

function clearImages() {
  images.forEach(i => {
    if (i.blobUrl) URL.revokeObjectURL(i.blobUrl);
    if (i.detectionBlobUrl) URL.revokeObjectURL(i.detectionBlobUrl);
  });
  images.length = 0;
  renderThumbs();
}

// ── Resize detection: marker dims vs current frame dims, ±1px tolerance ──────
function isResizedMb3k() {
  if (!selectedFrame || !selectedFrame.mb3k || selectedFrame.mb3k.__unknown) return false;
  const m = selectedFrame.mb3k;
  if (typeof m.width !== 'number' || typeof m.height !== 'number') return false;
  return Math.abs(selectedFrame.width  - m.width)  > 1
      || Math.abs(selectedFrame.height - m.height) > 1;
}

function getButtonState() {
  const hasContent = images.length >= 5 && !images.some(i => i.pending);
  const hasFrame   = !!selectedFrame;
  const isMb3k     = !!(selectedFrame && selectedFrame.mb3k && selectedFrame.mb3k.mode);
  const resized    = isMb3k && isResizedMb3k();

  if (isMb3k && !resized) return { label: 'Remix 3000',       enabled: true,        kind: 'shuffle'  };
  if (isMb3k && resized)  return { label: 'Fit to Size 3000', enabled: true,        kind: 'fit'      };
  // Custom (non-MB3K) frame selected — generate panel images into it.
  // Fit to Size only makes sense for an existing MB3K moodboard.
  if (hasFrame)           return { label: 'Engage 3000',      enabled: hasContent,  kind: 'generate' };
  if (hasContent)         return { label: 'Engage 3000',      enabled: true,        kind: 'generate' };
  return                    { label: 'Engage 3000',           enabled: false,       kind: 'idle'     };
}

function updateGenerateBtn() {
  const state = getButtonState();
  generateBtn.toggleAttribute('disabled', !state.enabled);
  generateBtn.textContent = state.label;
  generateBtn.dataset.kind = state.kind;
  evaluateFrameWarning();
}

// ── Frame mode (bring-your-own-frame) ────────────────────────────────────────
function approxRatio(w, h) {
  const r = w / h;
  const common = [[16, 9], [4, 3], [1, 1], [3, 4], [9, 16]];
  let best = null, bestDelta = Infinity;
  for (const [a, b] of common) {
    const d = Math.abs(r - a / b);
    if (d < bestDelta) { bestDelta = d; best = [a, b]; }
  }
  if (bestDelta / (best[0] / best[1]) < 0.03) return `≈${best[0]}:${best[1]}`;
  return `≈${r.toFixed(2)}:1`;
}

function applyFrameMode() {
  if (selectedFrame) {
    presetSelect.style.display = 'none';
    presetSelect.setAttribute('disabled', '');
    const w = selectedFrame.width, h = selectedFrame.height;
    frameReadout.textContent = `Using frame · ${w}×${h} (${approxRatio(w, h)})`;
    frameReadoutRow.style.display = '';
  } else if (isSlides) {
    // Slides are deck-fixed — the page-size preset doesn't apply. Generate always
    // adds a new slide (no empty-slide reuse), so the readout is always "New
    // Slide" plus the deck dimensions (from code.js getSlideTargetInfo).
    presetSelect.style.display = 'none';
    presetSelect.setAttribute('disabled', '');
    const dims = slideTarget ? `${slideTarget.width}×${slideTarget.height}` : '1920×1080';
    frameReadout.textContent = `New Slide · ${dims}`;
    frameReadoutRow.style.display = '';
  } else {
    presetSelect.style.display = '';
    presetSelect.removeAttribute('disabled');
    frameReadoutRow.style.display = 'none';
  }
  applyLayoutLock();
  evaluateFrameWarning();
}

// Soft-lock the segmented control to the marker's mode when an MB3K frame is
// selected and not resized. Uses the parent's `value` attribute (figui3
// reflects this to the selected fig-segment internally).
function applyLayoutLock() {
  const isMb3kFrame = !!(selectedFrame && selectedFrame.mb3k && selectedFrame.mb3k.mode);
  const lockedMode = isMb3kFrame ? selectedFrame.mb3k.mode : null;
  const visualMode = lockedMode || currentLayout;
  segControl.setAttribute('value', visualMode);
  segControl.classList.toggle('locked', !!lockedMode);
  lockNote.classList.toggle('visible', !!lockedMode);
  if (lockedMode) {
    lockNote.textContent = isResizedMb3k()
      ? 'Fit to Size preserves the original mode'
      : 'Remix preserves the original mode';
  }
  // Both Remix and Fit to Size operate on the existing MB3K moodboard,
  // not the panel images — dim the image preview area in either state.
  document.querySelector('.panel-pad').classList.toggle('locked', isMb3kFrame);
}

function evaluateFrameWarning() {
  if (!selectedFrame) {
    frameWarnIcon.classList.remove('visible');
    return;
  }
  const ready = images.filter(i => !i.pending && i.hash).length;
  let count;
  if (selectedFrame.mb3k && selectedFrame.mb3k.mode) {
    count = ready >= 5 ? ready : (selectedFrame.mb3k.imageCount || ready);
  } else {
    count = ready;
  }
  if (count === 0) {
    frameWarnIcon.classList.remove('visible');
    return;
  }

  // Grid: never warn
  if (currentLayout === 'grid') {
    frameWarnIcon.classList.remove('visible');
    return;
  }

  const w = selectedFrame.width, h = selectedFrame.height;

  // Masonry: only warn on extreme portrait (h/w >= 5 AND h > w)
  if (currentLayout === 'masonry') {
    frameWarnIcon.classList.toggle('visible', h > w && h / w >= 5);
    return;
  }

  // Editorial / Cluster: only warn when imageCount >= 10
  if (currentLayout === 'editorial' || currentLayout === 'cluster') {
    if (count < 10) {
      frameWarnIcon.classList.remove('visible');
      return;
    }
  }

  const shortSide = Math.min(w, h);
  const perImageArea = (w * h) / count;
  const tight = shortSide < 300 || perImageArea < 40000;
  frameWarnIcon.classList.toggle('visible', tight);
}

// ── Image registration ───────────────────────────────────────────────────────
function addFromSelection(rawImages) {
  for (const img of rawImages) {
    var key = img.nodeId || img.hash;
    if (key && images.some(i => (i.nodeId || i.hash) === key)) continue;
    if (images.length >= MAX_IMAGES) {
      break;
    }
    let blobUrl = null;
    if (img.thumb && img.thumb.length) {
      const blob = new Blob([new Uint8Array(img.thumb)], { type: 'image/jpeg' });
      blobUrl = URL.createObjectURL(blob);
    }
    const isVideoRecord = img.fillType === 'VIDEO';
    images.push({ id: img.nodeId || img.id || img.hash, type: 'selection', hash: img.hash,
      nodeId: img.nodeId, width: img.width, height: img.height, name: img.name, blobUrl,
      imageTransform: img.imageTransform || null, sourceScaleMode: img.sourceScaleMode || null,
      fillType: img.fillType || 'IMAGE',
      focal: isVideoRecord ? { x: 0.5, y: 0.5, method: 'skipped-video' } : null });
    if (blobUrl && !isVideoRecord) runFocalDetection(images[images.length - 1]);
  }
  renderThumbs();
}

async function addFromFiles(files) {
  let capped = false;
  let added = 0;
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (images.length >= MAX_IMAGES) { capped = true; break; }
    const id = nextId++;
    try {
      const { bytes, width, height, blobUrl } = await compressImage(file);
      if (images.length >= MAX_IMAGES) { capped = true; break; }
      images.push({ id, type: 'upload', hash: null, width, height, name: file.name, blobUrl, pending: true, focal: null });
      runFocalDetection(images[images.length - 1]);
      renderThumbs();
      sendChunked(id, bytes);
      added++;
    } catch (e) {
      console.error('Failed to process file:', e);
    }
  }
  if (!capped && added > 0) {
    setStatus(`Drag-ins scaled to ${MAX_COMPRESS_DIM}px max.`, '', 3000);
  }
}

function compressImage(file) {
  return new Promise((resolve, reject) => {
    const blobUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const origW = img.naturalWidth, origH = img.naturalHeight;
      let w = origW, h = origH;
      if (w > MAX_COMPRESS_DIM || h > MAX_COMPRESS_DIM) {
        if (w >= h) { h = Math.round(h * MAX_COMPRESS_DIM / w); w = MAX_COMPRESS_DIM; }
        else        { w = Math.round(w * MAX_COMPRESS_DIM / h); h = MAX_COMPRESS_DIM; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve({
          bytes: Array.from(new Uint8Array(e.target.result)),
          width: origW, height: origH, blobUrl,
        });
        reader.onerror = reject;
        reader.readAsArrayBuffer(blob);
      }, 'image/jpeg', 0.85);
    };
    img.onerror = reject;
    img.src = blobUrl;
  });
}

function sendChunked(id, bytes) {
  const totalChunks = Math.max(1, Math.ceil(bytes.length / MAX_CHUNK_BYTES));
  for (let ci = 0; ci < totalChunks; ci++) {
    const chunk = bytes.slice(ci * MAX_CHUNK_BYTES, (ci + 1) * MAX_CHUNK_BYTES);
    parent.postMessage({ pluginMessage: { type: 'register-image', id, bytes: chunk, chunkIndex: ci, totalChunks } }, '*');
  }
}

// ── UI events ────────────────────────────────────────────────────────────────
const refreshTooltip = document.getElementById('refresh-tooltip');
const refreshBtn     = document.getElementById('refresh-btn');
const clearBtn       = document.getElementById('clear-btn');
const emptyShimmer   = document.getElementById('empty-shimmer');
let selectedCount = 0;

function updateImageButtons() {
  refreshBtn.toggleAttribute('disabled', selectedCount === 0);
  clearBtn.toggleAttribute('disabled', images.length === 0);
  refreshTooltip.setAttribute('text', selectedCount === 1 ? 'Add selected image' : 'Add selected images');
}

function updateScrollFades() {
  const wrap = thumbStrip.parentElement;
  wrap.classList.toggle('show-fade-left', thumbStrip.scrollLeft > 0);
}

function refreshSelection() {
  parent.postMessage({ pluginMessage: { type: 'refresh-selection' } }, '*');
}
document.getElementById('refresh-btn').addEventListener('click', refreshSelection);
document.getElementById('clear-btn').addEventListener('click', clearImages);

thumbStrip.addEventListener('scroll', updateScrollFades, { passive: true });
thumbStrip.addEventListener('mouseenter', () => {
  if (images.length === 0) emptyShimmer.removeAttribute('playing');
});
thumbStrip.addEventListener('mouseleave', () => {
  emptyShimmer.setAttribute('playing', 'false');
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) { addFromFiles(Array.from(fileInput.files)); fileInput.value = ''; }
});

thumbStrip.addEventListener('dragover',  (e) => { e.preventDefault(); thumbStrip.style.outline = '2px dashed var(--figma-color-bg-brand, #0D99FF)'; });
thumbStrip.addEventListener('dragleave', ()  => { thumbStrip.style.outline = ''; });
thumbStrip.addEventListener('drop', (e) => {
  e.preventDefault(); thumbStrip.style.outline = '';
  const files = Array.from(e.dataTransfer.files);
  if (files.length) addFromFiles(files);
});

// ── figui3 component events → settings state ───────────────────────────────
// Read value from event detail (string for segmented) or from target.value
function readVal(e) {
  if (e.detail !== undefined && e.detail !== null) {
    if (typeof e.detail === 'string' || typeof e.detail === 'number') return e.detail;
    if (e.detail.value !== undefined) return e.detail.value;
  }
  return e.target.value;
}

// Layout segmented control
segControl.addEventListener('change', (e) => {
  const v = readVal(e);
  if (typeof v === 'string') {
    currentLayout = v;
    settings.layout = v;
  }
});

// Sliders — read live on input
gapSlider.addEventListener('input', (e) => { settings.gap     = parseInt(readVal(e)) || 0; });
padSlider.addEventListener('input', (e) => { settings.padding = parseInt(readVal(e)) || 0; });
radSlider.addEventListener('input', (e) => { settings.rounding = parseInt(readVal(e)) || 0; });

// Background color
bgPicker.addEventListener('input', (e) => {
  const c = (e.detail && e.detail.color) || readVal(e);
  if (typeof c === 'string' && /^#[0-9A-Fa-f]{6,8}$/.test(c)) settings.bgColor = c.slice(0, 7).toUpperCase();
});

// Preset dropdown
presetSelect.addEventListener('change', (e) => {
  const v = readVal(e);
  if (typeof v === 'string') settings.presetKey = v;
});

// ── Generate ─────────────────────────────────────────────────────────────────
generateBtn.addEventListener('click', () => {
  const state = getButtonState();
  if (!state.enabled) return;

  const baseConfig = {
    gap:          settings.gap,
    padding:      settings.padding,
    bgColor:      { hex: settings.bgColor, opacity: 1 },
    cornerRadius: settings.rounding,
  };
  const imagePayload = images.map(img => ({
    id: img.id, hash: img.hash || null, nodeId: img.nodeId || null,
    width: img.width, height: img.height, name: img.name,
    imageTransform: img.imageTransform || null, sourceScaleMode: img.sourceScaleMode || null,
    focal: img.focal || null,
    fillType: img.fillType || 'IMAGE',
  }));

  generateBtn.toggleAttribute('disabled', true);

  // Shuffle: MB3K frame, dims match → re-roll with marker mode + variance
  if (state.kind === 'shuffle') {
    setStatus('Remixing…');
    parent.postMessage({ pluginMessage: {
      type: 're-roll', frameId: selectedFrame.id, images: imagePayload, config: baseConfig,
    } }, '*');
    return;
  }

  // Fit to Frame on resized MB3K: re-roll with panel mode override (no variance)
  if (state.kind === 'fit' && isResizedMb3k()) {
    setStatus('Fitting…');
    parent.postMessage({ pluginMessage: {
      type: 're-roll', frameId: selectedFrame.id, images: imagePayload,
      config: Object.assign({}, baseConfig, { layout: currentLayout }),
      overrideMode: currentLayout,
    } }, '*');
    return;
  }

  // Fit to Frame on non-MB3K: generate-into-frame (V2.1 BYO behavior, append)
  // OR Generate fresh: no frameId, new frame created
  setStatus('Engaging…');
  const preset = PRESETS[settings.presetKey] || PRESETS['1920x1080'];
  const config = Object.assign({}, baseConfig, { preset, layout: currentLayout });
  const payload = { type: 'generate', images: imagePayload, config };
  if (selectedFrame) payload.frameId = selectedFrame.id;
  parent.postMessage({ pluginMessage: payload }, '*');
});

// ── Messages from code.js ─────────────────────────────────────────────────────
window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'init') {
    if (msg.editorType) isSlides = (msg.editorType === 'slides');
    addFromSelection(msg.images || []);
    applyFrameMode();
  } else if (msg.type === 'selection-state') {
    selectedFrame = msg.frame || null;
    slideTarget = msg.slideTarget || null;
    applyFrameMode();
    updateGenerateBtn();
    selectedCount = msg.selectionImageCount || 0;
    updateImageButtons();
  } else if (msg.type === 'image-registered') {
    const img = images.find(i => i.id === msg.id);
    if (img) { img.hash = msg.hash; img.pending = false; }
    renderThumbs();
  } else if (msg.type === 'image-register-error') {
    const idx = images.findIndex(i => i.id === msg.id);
    if (idx !== -1) images.splice(idx, 1);
    renderThumbs();
    console.error('Image register failed:', msg.message || 'unknown error');
    setStatus("Couldn't add that image.", 'error');
  } else if (msg.type === 'thumb-update') {
    const img = msg.nodeId
      ? images.find(i => i.nodeId === msg.nodeId)
      : images.find(i => i.hash === msg.hash);
    if (img && msg.thumb && msg.thumb.length) {
      if (img.blobUrl) URL.revokeObjectURL(img.blobUrl);
      img.blobUrl = URL.createObjectURL(new Blob([new Uint8Array(msg.thumb)], { type: 'image/jpeg' }));
      // Selection images: focal detection waits for the higher-res
      // 'detection-source' message. The 80px blobUrl is panel-only.
      renderThumbs();
    }
  } else if (msg.type === 'detection-source') {
    // Original image bytes (from getBytesAsync on the source hash), paired
    // with the 80px panel thumb. Used only by focal-point detection — never
    // displayed. Note: msg.bytes is a Uint8Array (sent directly via structured
    // clone, no Array.from). new Uint8Array(typedArray) and the new
    // Blob([typedArray]) constructor both accept it natively.
    const img = images.find(i => i.nodeId === msg.nodeId);
    if (img && msg.bytes && msg.bytes.length) {
      if (img.detectionBlobUrl) URL.revokeObjectURL(img.detectionBlobUrl);
      img.detectionBlobUrl = URL.createObjectURL(new Blob([new Uint8Array(msg.bytes)], { type: 'image/jpeg' }));
      img.focal = null;
      runFocalDetection(img);
    }
  } else if (msg.type === 'detection-skip') {
    // Skipped upstream: either user-cropped fill or video fill.
    // Mark focal as resolved so runFocalDetection doesn't re-queue it.
    const img = images.find(i => i.nodeId === msg.nodeId);
    if (img) {
      img.focal = msg.reason === 'video'
        ? { x: 0.5, y: 0.5, method: 'skipped-video' }
        : { x: 0.5, y: 0.5, method: 'skipped-user-cropped' };
    }
  } else if (msg.type === 'done') {
    const doneText = msg.kind === 'shuffled' ? 'Remixed!'
                   : msg.kind === 'fit'      ? 'Done!'
                                             : 'Engaged!';
    setStatus(doneText, 'success');
    updateGenerateBtn();
  } else if (msg.type === 'error') {
    setStatus(msg.message || 'Something went wrong.', 'error');
    updateGenerateBtn();
  }
};

// ── Status toast (pinned above primary button) ──────────────────────────────
const statusText = document.getElementById('status-text');

function setStatus(msg, type, duration) {
  if (!msg) {
    statusToast.removeAttribute('open');
    statusText.textContent = '';
    return;
  }
  const inProgress = msg.endsWith('…') || /Engaging|Remixing|Fitting/i.test(msg);
  statusText.textContent = '';
  if (inProgress) {
    const spinner = document.createElement('fig-spinner');
    statusText.appendChild(spinner);
  }
  statusText.appendChild(document.createTextNode(msg));
  // fig-toast auto-closes after its `duration` (ms); default 2s, override per call
  // (e.g. the longer upload notice gets more dwell time).
  statusToast.setAttribute('duration', duration != null ? duration : 2000);
  statusToast.setAttribute('open', '');
}

renderThumbs();

</script>
</body>
</html>
